# PostgreSQL Configuration for Thrifts MVP
# Place this in your PostgreSQL config directory and include in postgresql.conf
# Adjust values based on your actual instance size

# Memory Configuration
# shared_buffers = 8GB              # 25% of RAM for 32GB instance
# effective_cache_size = 24GB       # 75% of RAM for 32GB instance
# work_mem = 32MB                   # Per operation memory
# maintenance_work_mem = 2GB        # For VACUUM, index creation
# temp_buffers = 32MB               # Temporary table memory

# Example for smaller instance (8GB RAM):
shared_buffers = 2GB                # 25% of 8GB RAM
effective_cache_size = 6GB          # 75% of 8GB RAM
work_mem = 16MB                     # Per operation memory
maintenance_work_mem = 512MB        # For VACUUM, index creation
temp_buffers = 16MB                 # Temporary table memory

# WAL and Checkpointing
max_wal_size = 16GB                 # Maximum WAL size before checkpoint
min_wal_size = 2GB                  # Minimum WAL size to keep
checkpoint_timeout = 15min          # Time between checkpoints
checkpoint_completion_target = 0.7  # Spread checkpoint I/O
wal_compression = on                # Compress WAL records
wal_log_hints = on                  # For easier PITR

# Connection and Pooling
max_connections = 200               # Total connections (use PgBouncer for pooling)
superuser_reserved_connections = 3  # Reserved for superuser

# Query Planner
random_page_cost = 1.1              # Lower for NVMe SSD
seq_page_cost = 1.0                 # Sequential read cost
effective_io_concurrency = 200      # Concurrent I/O operations for SSD

# Autovacuum Tuning (important for partitioned tables)
autovacuum_max_workers = 4
autovacuum_vacuum_scale_factor = 0.05    # Vacuum when 5% of table changes
autovacuum_analyze_scale_factor = 0.02   # Analyze when 2% of table changes
autovacuum_vacuum_cost_limit = 2000      # Increase vacuum speed
autovacuum_vacuum_cost_delay = 2ms       # Small delay between vacuum operations

# Monitoring and Logging
track_io_timing = on                # Track I/O timing (small overhead)
log_min_duration_statement = 1000   # Log queries taking > 1 second
log_checkpoints = on               # Log checkpoint activity
log_connections = off              # Don't log connections (too verbose)
log_disconnections = off           # Don't log disconnections
log_lock_waits = on               # Log lock waits
log_temp_files = 100MB            # Log temp files > 100MB

# Stats Collection
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000     # Track top 10k queries
pg_stat_statements.track = all     # Track all statements
pg_stat_statements.save = on       # Persist across restarts

# Replication (for read replica)
max_replication_slots = 10
max_wal_senders = 10
hot_standby = on                   # Enable read queries on replica
hot_standby_feedback = on          # Reduce replica conflicts (watch bloat)

# Security
ssl = on                          # Enable SSL
ssl_cert_file = 'server.crt'     # SSL certificate
ssl_key_file = 'server.key'      # SSL private key
ssl_ca_file = 'ca.crt'           # Certificate authority

# Locale and Character Set
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'

# Extensions (ensure these are available)
# pgvector for vector similarity search
# pg_stat_statements for query monitoring
# pg_trgm for text search
# pgcrypto for cryptographic functions

# Performance Notes:
# 1. Monitor pg_stat_statements for slow queries
# 2. Watch autovacuum logs for tables that need tuning
# 3. Use EXPLAIN (ANALYZE, BUFFERS) for query optimization
# 4. Monitor cache hit ratios (should be >95% for hot data)
# 5. Partition rotation job should run weekly
# 6. Test backup/restore monthly
